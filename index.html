<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rambleta LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .admin-only { display: none; }
        body.is-admin .admin-only { display: flex; }
        .score-font { font-variant-numeric: tabular-nums; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; background: #000; border-radius: 1rem; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        @keyframes pulse-red {
            0%, 100% { background-color: white; }
            50% { background-color: #fee2e2; }
        }
        .timer-alert-active { animation: pulse-red 0.5s infinite; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <!-- Navbar -->
    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50 border-b border-slate-800 shadow-xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic text-yellow-400 tracking-tighter">RAMBLETA LIVE</h1>
                <div id="status" class="flex items-center gap-1.5">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></div>
                    <span id="status-text" class="text-[9px] font-bold uppercase tracking-widest text-slate-400">Conectando...</span>
                </div>
            </div>
            <div id="admin-badge" class="hidden bg-yellow-500 text-slate-900 text-[9px] font-black px-2 py-1 rounded uppercase">Admin</div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- Streaming Twitch -->
        <div class="bg-slate-800 rounded-[2rem] overflow-hidden shadow-lg border border-slate-700">
            <button onclick="toggleVideo()" class="w-full p-4 flex justify-between items-center text-white">
                <div class="flex items-center gap-2">
                    <i data-lucide="video" class="w-4 h-4 text-purple-400"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">En directo desde Twitch</span>
                </div>
                <i data-lucide="chevron-down" class="w-4 h-4" id="video-chevron"></i>
            </button>
            <div id="video-box" class="p-4 pt-0 hidden">
                <div class="video-container" id="twitch-container">
                    <div class="absolute inset-0 flex items-center justify-center text-slate-500 text-xs font-bold uppercase tracking-widest">
                        Cargando stream...
                    </div>
                </div>
            </div>
        </div>

        <!-- Marcador Principal -->
        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200" id="main-scoreboard">
            <div class="flex justify-between items-center text-center">
                <div class="flex-1">
                    <p class="text-[10px] font-black text-yellow-600 uppercase tracking-widest mb-1">Amarillo</p>
                    <div class="text-7xl font-black score-font tracking-tighter" id="score-y">0</div>
                    <div class="admin-only justify-center gap-2 mt-4">
                        <button onclick="updateScore('y', -1)" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 text-xl font-bold border border-slate-200">-</button>
                        <button onclick="updateScore('y', 1)" class="w-10 h-10 rounded-xl bg-yellow-400 flex items-center justify-center text-yellow-900 text-xl font-bold shadow-md border border-yellow-500">+</button>
                    </div>
                </div>
                <div class="font-black text-slate-100 italic mx-4 text-3xl">VS</div>
                <div class="flex-1">
                    <p class="text-[10px] font-black text-orange-600 uppercase tracking-widest mb-1">Naranja</p>
                    <div class="text-7xl font-black score-font tracking-tighter" id="score-o">0</div>
                    <div class="admin-only justify-center gap-2 mt-4">
                        <button onclick="updateScore('o', -1)" class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center text-slate-400 text-xl font-bold border border-slate-200">-</button>
                        <button onclick="updateScore('o', 1)" class="w-10 h-10 rounded-xl bg-orange-500 flex items-center justify-center text-white text-xl font-bold shadow-md border border-orange-600">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tiempo -->
        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200 flex flex-col items-center" id="timer-box">
            <div id="timer" class="text-7xl font-black text-slate-800 score-font tracking-tighter mb-2">00:00</div>
            <div id="timer-alert" class="h-6 text-red-600 font-black text-xs uppercase tracking-[0.2em] hidden">⚠️ CAMBIO DE JUGADORES ⚠️</div>
            
            <div class="admin-only w-full gap-3 mt-4">
                <button id="btn-play" onclick="toggleClock()" class="flex-1 h-14 bg-indigo-600 text-white rounded-2xl font-black uppercase text-sm tracking-widest shadow-lg flex items-center justify-center gap-3">
                    <i id="btn-icon" data-lucide="play" class="w-5 h-5 fill-current"></i> <span id="btn-text">Iniciar</span>
                </button>
                <button onclick="resetMatch()" class="w-14 h-14 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center border border-slate-200">
                    <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <!-- Jugadores -->
        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-3">
                <h3 class="text-[10px] font-black uppercase text-yellow-600 pl-2 flex items-center gap-2">
                    <div class="w-2 h-2 bg-yellow-400 rounded-full"></div> Equipo Amarillo
                </h3>
                <div id="list-y" class="space-y-2"></div>
            </div>
            <div class="space-y-3">
                <h3 class="text-[10px] font-black uppercase text-orange-600 pl-2 flex items-center gap-2">
                    <div class="w-2 h-2 bg-orange-500 rounded-full"></div> Equipo Naranja
                </h3>
                <div id="list-o" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <!-- Admin Panel -->
    <div class="fixed bottom-0 inset-x-0 p-4 bg-white/95 backdrop-blur-md border-t border-slate-200 z-50">
        <div class="max-w-md mx-auto" id="login-container">
            <div class="flex gap-2 items-center">
                <input type="password" id="pin-input" placeholder="PIN ADMIN" class="flex-1 h-12 bg-slate-100 border-none rounded-xl px-4 text-center font-bold tracking-[0.5em] focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
                <button onclick="tryLogin()" class="h-12 px-6 bg-slate-900 text-white rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-transform">Entrar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCo7qB8-8GSrBbWevoNQsufTmnlto2vZoU",
            authDomain: "teams-13d3b.firebaseapp.com",
            projectId: "teams-13d3b",
            storageBucket: "teams-13d3b.firebasestorage.app",
            messagingSenderId: "690933795763",
            appId: "1:690933795763:web:55575fe946d21ee86959c6"
        };

        const playersY = ["Albert g", "Sergi", "Xavi", "Giacomo", "Mike R", "Jordi"];
        const playersO = ["Mikel", "Guillermo", "Hadi Tembo", "Luis", "Joan", "Paco"];
        const PIN_SECRET = "1234";
        const CHANGE_INTERVAL = 300; 

        let db, matchDoc;
        let state = { scoreY: 0, scoreO: 0, seconds: 0, running: false, lastUpd: Date.now() };
        let localSecs = 0;
        let clockInterval = null;

        window.toggleVideo = () => {
            const box = document.getElementById('video-box');
            const container = document.getElementById('twitch-container');
            const chevron = document.getElementById('video-chevron');
            box.classList.toggle('hidden');
            if (!box.classList.contains('hidden')) {
                chevron.style.transform = 'rotate(180deg)';
                if (container.querySelector('iframe') === null) {
                    const channel = "PadresRambletaDelClot";
                    const parent = "teams-amber.vercel.app";
                    container.innerHTML = `<iframe src="https://player.twitch.tv/?channel=${channel}&parent=${parent}&muted=false&autoplay=true" allowfullscreen="true" scrolling="no" height="100%" width="100%"></iframe>`;
                }
            } else {
                chevron.style.transform = 'rotate(0deg)';
            }
        };

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        async function playSiren() {
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            for(let i=0; i<5; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = "square";
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1320, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.4);
                if (navigator.vibrate) navigator.vibrate(200);
                await new Promise(r => setTimeout(r, 500));
            }
        }

        const render = (s) => {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sc = (s % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${sc}`;
            const rotations = Math.floor(s / CHANGE_INTERVAL);
            drawTeam('list-y', playersY, rotations, 'yellow');
            drawTeam('list-o', playersO, rotations, 'orange');
            
            // Actualizar botón de control
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            if (state.running) {
                btnText.innerText = "Pausar";
                btnIcon.setAttribute('data-lucide', 'pause');
            } else {
                btnText.innerText = "Iniciar";
                btnIcon.setAttribute('data-lucide', 'play');
            }
            lucide.createIcons();
        };

        const drawTeam = (id, list, rot, color) => {
            const el = document.getElementById(id);
            let ord = [...list];
            for(let i=0; i<rot; i++) ord.unshift(ord.pop());
            el.innerHTML = ord.map((name, i) => {
                let role = i===2 ? '🧤' : (i===5 ? '🪑' : (i===0 ? '⬇️' : '🏃'));
                let bg = i===5 ? 'bg-slate-50 opacity-40 grayscale' : 'bg-white shadow-sm';
                if(i===2) bg = color === 'yellow' ? 'bg-yellow-50 border-yellow-200' : 'bg-orange-50 border-orange-200';
                return `<div class="p-3 rounded-xl border border-slate-100 ${bg} flex items-center justify-between text-[11px] font-bold text-slate-700"><span>${name}</span><span>${role}</span></div>`;
            }).join('');
        };

        const connect = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                const auth = getAuth(app);
                onAuthStateChanged(auth, (user) => {
                    if (user) initSync();
                    else signInAnonymously(auth).catch(() => initSync());
                });
            } catch (e) { document.getElementById('status-text').innerText = "Error Sync"; }
        };

        const initSync = () => {
            matchDoc = doc(db, 'matches', 'final-rambleta');
            onSnapshot(matchDoc, (snap) => {
                if (snap.exists()) {
                    state = snap.data();
                    document.getElementById('score-y').innerText = state.scoreY;
                    document.getElementById('score-o').innerText = state.scoreO;
                    
                    if (state.running) {
                        localSecs = state.seconds + Math.floor((Date.now() - state.lastUpd) / 1000);
                        if (!clockInterval) startTimer();
                        document.getElementById('timer-box').classList.remove('timer-alert-active');
                        document.getElementById('timer-alert').classList.add('hidden');
                    } else {
                        localSecs = state.seconds;
                        stopTimer();
                        if (localSecs > 0 && localSecs % CHANGE_INTERVAL === 0) {
                            document.getElementById('timer-alert').classList.remove('hidden');
                            document.getElementById('timer-box').classList.add('timer-alert-active');
                        }
                    }
                    render(localSecs);
                    document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-green-500 animate-pulse";
                    document.getElementById('status-text').innerText = "Sincronizado";
                } else { setDoc(matchDoc, state); }
            }, (error) => {
                document.getElementById('status-text').innerText = "Error DB";
            });
        };

        window.tryLogin = () => {
            if (document.getElementById('pin-input').value === PIN_SECRET) {
                document.body.classList.add('is-admin');
                document.getElementById('login-container').innerHTML = `<p class="text-center w-full font-black text-indigo-600 text-[10px] uppercase tracking-widest">✅ MODO CONTROLER ACTIVADO</p>`;
                document.getElementById('admin-badge').classList.remove('hidden');
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } else alert("PIN 1234");
        };

        window.updateScore = async (t, v) => {
            const key = t === 'y' ? 'scoreY' : 'scoreO';
            if(matchDoc) await updateDoc(matchDoc, { [key]: Math.max(0, state[key] + v) });
        };

        window.toggleClock = async () => {
            if(matchDoc) {
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                await updateDoc(matchDoc, {
                    running: !state.running,
                    seconds: localSecs,
                    lastUpd: Date.now()
                });
            }
        };

        window.resetMatch = async () => {
            if(confirm("¿Resetear marcador y tiempo?")) {
                await setDoc(matchDoc, { scoreY: 0, scoreO: 0, seconds: 0, running: false, lastUpd: Date.now() });
            }
        };

        function startTimer() {
            if(clockInterval) clearInterval(clockInterval);
            clockInterval = setInterval(() => { 
                localSecs++; 
                render(localSecs); 
                if (localSecs > 0 && localSecs % CHANGE_INTERVAL === 0) {
                    if (document.body.classList.contains('is-admin')) {
                        playSiren();
                        toggleClock(); 
                    }
                }
            }, 1000);
        }

        function stopTimer() {
            if(clockInterval) clearInterval(clockInterval);
            clockInterval = null;
        }

        render(0);
        connect();
    </script>
</body>
</html>
