<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rambleta Championship LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .player-card { transition: all 0.2s ease; }
        .admin-only { display: none; }
        .is-admin .admin-only { display: flex; }
        .is-admin .not-admin { display: none; }
        .is-admin .score-btn { display: flex !important; }
        .score-btn { display: none; }
    </style>
</head>
<body class="min-h-screen text-slate-900 pb-20">

    <header class="bg-slate-900 text-white shadow-xl">
        <div class="max-w-4xl mx-auto p-6 flex justify-between items-center">
            <div class="text-left">
                <h1 class="text-2xl font-black italic tracking-tighter text-yellow-400 uppercase leading-none">
                    RAMBLETA
                </h1>
                <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Championship LIVE</p>
            </div>
            <button onclick="checkAdmin()" id="admin-lock" class="p-2 rounded-full bg-slate-800 text-slate-500 border border-slate-700">
                <i data-lucide="lock" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 space-y-4">
        
        <!-- Marcador Compartido -->
        <section class="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
            <div class="flex items-center justify-between gap-2">
                <div class="flex-1 text-center">
                    <p class="text-[10px] font-black uppercase text-yellow-600 mb-2">Amarillo</p>
                    <div class="flex items-center justify-center gap-3">
                        <button onclick="changeScore('yellow', -1)" class="score-btn w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">-</button>
                        <span id="score-yellow" class="text-6xl font-black tabular-nums">0</span>
                        <button onclick="changeScore('yellow', 1)" class="score-btn w-8 h-8 rounded-full bg-yellow-400 flex items-center justify-center text-yellow-900 shadow-md">+</button>
                    </div>
                </div>
                <div class="text-slate-200 font-black italic text-xl">VS</div>
                <div class="flex-1 text-center">
                    <p class="text-[10px] font-black uppercase text-orange-600 mb-2">Naranja</p>
                    <div class="flex items-center justify-center gap-3">
                        <button onclick="changeScore('orange', -1)" class="score-btn w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-400">-</button>
                        <span id="score-orange" class="text-6xl font-black tabular-nums">0</span>
                        <button onclick="changeScore('orange', 1)" class="score-btn w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center text-white shadow-md">+</button>
                    </div>
                </div>
            </div>
            <p id="admin-msg" class="not-admin text-center text-[9px] text-slate-400 mt-4 uppercase font-bold tracking-widest italic">Modo Espectador: Solo Lectura</p>
        </section>

        <!-- Cronómetro -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-200 flex flex-col items-center">
                <div id="game-time" class="text-6xl font-black text-slate-800 tabular-nums mb-4 tracking-tighter">00:00</div>
                
                <!-- Botones Admin -->
                <div class="admin-only w-full gap-2">
                    <button id="btn-timer" onclick="toggleMatch()" class="flex-1 bg-indigo-600 text-white h-14 rounded-2xl font-black uppercase text-sm tracking-widest shadow-lg flex items-center justify-center gap-2">
                        <i data-lucide="play" class="w-5 h-5"></i> <span>Empezar</span>
                    </button>
                    <button onclick="resetMatch()" class="bg-slate-100 text-slate-500 w-14 h-14 rounded-2xl flex items-center justify-center border border-slate-200">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>
                <!-- Botón Espectador -->
                <div class="not-admin w-full">
                    <div class="w-full bg-slate-50 text-slate-400 h-14 rounded-2xl font-bold uppercase text-[10px] flex items-center justify-center gap-2 border border-dashed border-slate-200">
                        <i data-lucide="clock" class="w-4 h-4"></i> Tiempo en tiempo real
                    </div>
                </div>
            </div>

            <!-- Simulador Local (Siempre disponible) -->
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black uppercase text-slate-400">Previsión Local</span>
                    <span id="label-min" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg">Min 0</span>
                </div>
                <input type="range" id="slider" min="0" max="60" step="5" value="0" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                <p class="text-[9px] text-slate-400 text-center mt-2 italic">Desliza para ver quién entra al campo en el futuro.</p>
            </div>
        </div>

        <!-- Equipos -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-3">
                <h2 class="bg-yellow-400 p-3 rounded-xl font-black text-yellow-900 text-xs uppercase italic tracking-widest">Equipo Amarillo 💛</h2>
                <div id="list-yellow" class="space-y-2"></div>
            </div>
            <div class="space-y-3">
                <h2 class="bg-orange-500 p-3 rounded-xl font-black text-white text-xs uppercase italic tracking-widest">Equipo Naranja 🧡</h2>
                <div id="list-orange" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIGURACIÓN DE JUGADORES
        const playersYellow = ["Víctor", "Guillermo", "Mikel", "Hadi", "Michele", "David"];
        const playersOrange = ["Aureli", "Ayoub II", "Gabriel", "Vila", "Robert", "Mike"];
        
        const appId = "rambleta-v4-sync";
        let state = { scoreY: 0, scoreO: 0, secs: 0, running: false, lastUpd: Date.now() };
        let localSecs = 0;
        let timer = null;
        let db;

        // --- AUTH & SYNC ---
        const config = JSON.parse(__firebase_config);
        const app = initializeApp(config);
        db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth).then(() => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'match');
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    state = snap.data();
                    updateUIFromState();
                } else {
                    setDoc(docRef, state);
                }
            });
        });

        function updateUIFromState() {
            document.getElementById('score-yellow').innerText = state.scoreY;
            document.getElementById('score-orange').innerText = state.scoreO;
            
            if (state.running) {
                const now = Date.now();
                const diff = Math.floor((now - state.lastUpd) / 1000);
                localSecs = state.secs + diff;
                if (!timer) startVisualTimer();
            } else {
                localSecs = state.secs;
                stopVisualTimer();
                render(localSecs);
            }
        }

        // --- ACCIONES ADMIN ---
        window.changeScore = async (team, v) => {
            if (!document.body.classList.contains('is-admin')) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'match');
            const key = team === 'yellow' ? 'scoreY' : 'scoreO';
            await updateDoc(docRef, { [key]: Math.max(0, state[key] + v) });
        };

        window.toggleMatch = async () => {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'match');
            await updateDoc(docRef, {
                running: !state.running,
                secs: localSecs,
                lastUpd: Date.now()
            });
        };

        window.resetMatch = async () => {
            if(!confirm("¿Resetear marcador y tiempo para todos?")) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'match');
            await setDoc(docRef, { scoreY: 0, scoreO: 0, secs: 0, running: false, lastUpd: Date.now() });
        };

        // --- RENDERIZADO ---
        function render(s) {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sc = (s % 60).toString().padStart(2, '0');
            document.getElementById('game-time').innerText = `${m}:${sc}`;
            
            const iter = Math.floor(s / 300);
            renderList('list-yellow', playersYellow, iter, 'yellow');
            renderList('list-orange', playersOrange, iter, 'orange');
            lucide.createIcons();
        }

        function renderList(id, p, iter, color) {
            const el = document.getElementById(id);
            el.innerHTML = '';
            let ord = [...p];
            for(let i=0; i<iter; i++) ord.unshift(ord.pop());
            
            ord.forEach((name, i) => {
                let role = i===2 ? 'Portero' : (i===5 ? 'Banquillo' : 'Campo');
                let bg = i===5 ? 'bg-slate-50 opacity-50 border-dashed' : 'bg-white shadow-sm';
                if(i===2) bg = color==='yellow' ? 'bg-yellow-50 border-yellow-300 ring-2 ring-yellow-400/20' : 'bg-orange-50 border-orange-300 ring-2 ring-orange-500/20';
                
                const card = document.createElement('div');
                card.className = `player-card p-3 rounded-2xl border flex items-center justify-between ${bg}`;
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <i data-lucide="${i===2?'shield':(i===5?'coffee':'user')}" class="w-4 h-4"></i>
                        <span class="font-bold text-sm tracking-tight">${name}</span>
                    </div>
                    <span class="text-[8px] font-black uppercase px-2 py-1 rounded-lg ${i===2?'bg-slate-900 text-white':'bg-slate-100 text-slate-400'}">${role}</span>
                `;
                el.appendChild(card);
            });
        }

        function startVisualTimer() {
            if (timer) clearInterval(timer);
            const btn = document.getElementById('btn-timer');
            btn.classList.replace('bg-indigo-600', 'bg-red-500');
            btn.innerHTML = '<i data-lucide="pause" class="w-5 h-5"></i> <span>Pausar</span>';
            timer = setInterval(() => { localSecs++; render(localSecs); }, 1000);
            lucide.createIcons();
        }

        function stopVisualTimer() {
            if (timer) clearInterval(timer);
            timer = null;
            const btn = document.getElementById('btn-timer');
            if(btn) {
                btn.classList.replace('bg-red-500', 'bg-indigo-600');
                btn.innerHTML = '<i data-lucide="play" class="w-5 h-5"></i> <span>Reanudar</span>';
            }
            lucide.createIcons();
        }

        // --- LOGIN ADMIN ---
        window.checkAdmin = () => {
            const pass = prompt("Introduce la clave de Administrador:");
            if (pass === "1234") {
                document.body.classList.add('is-admin');
                document.getElementById('admin-lock').classList.replace('text-slate-500', 'text-yellow-400');
                document.getElementById('admin-lock').classList.replace('bg-slate-800', 'bg-slate-700');
                document.getElementById('admin-lock').innerHTML = '<i data-lucide="unlock" class="w-4 h-4"></i>';
                lucide.createIcons();
            } else {
                alert("Clave incorrecta.");
            }
        };

        // Slider Local
        document.getElementById('slider').oninput = (e) => {
            const min = parseInt(e.target.value);
            document.getElementById('label-min').innerText = `Min ${min}`;
            render(min * 60);
        };

        render(0);
    </script>
</body>
</html>
