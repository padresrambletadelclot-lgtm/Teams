<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rambleta LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .player-card { transition: all 0.2s ease; }
        .admin-controls { display: none; }
        body.is-admin .admin-controls { display: flex; }
        body.is-admin .viewer-msg { display: none; }
        .tab-active { border-bottom: 3px solid #fbbf24; color: #fbbf24; }
    </style>
</head>
<body class="min-h-screen pb-24">

    <!-- Header con Estado -->
    <header class="bg-slate-900 text-white p-5 shadow-2xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic text-yellow-400 leading-none">RAMBLETA</h1>
                <p class="text-[9px] font-bold tracking-[0.2em] text-slate-400 uppercase">Championship 2024</p>
            </div>
            <div id="status-dot" class="flex items-center gap-2 px-3 py-1 bg-slate-800 rounded-full border border-slate-700">
                <div class="w-2 h-2 rounded-full bg-red-500"></div>
                <span class="text-[9px] font-bold uppercase text-slate-300">Offline</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- Marcador Principal -->
        <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 relative overflow-hidden">
            <div class="flex justify-between items-center relative z-10">
                <div class="text-center flex-1">
                    <span class="text-[10px] font-black uppercase text-yellow-600 tracking-tighter">Amarillo</span>
                    <div class="text-6xl font-black tabular-nums my-2" id="score-y">0</div>
                    <div class="admin-controls justify-center gap-2">
                        <button onclick="modScore('y',-1)" class="w-10 h-10 rounded-full bg-slate-100 text-slate-400 font-bold">-</button>
                        <button onclick="modScore('y',1)" class="w-10 h-10 rounded-full bg-yellow-400 text-yellow-900 font-bold shadow-lg">+</button>
                    </div>
                </div>
                <div class="font-black text-slate-200 italic text-2xl px-4">VS</div>
                <div class="text-center flex-1">
                    <span class="text-[10px] font-black uppercase text-orange-600 tracking-tighter">Naranja</span>
                    <div class="text-6xl font-black tabular-nums my-2" id="score-o">0</div>
                    <div class="admin-controls justify-center gap-2">
                        <button onclick="modScore('o',-1)" class="w-10 h-10 rounded-full bg-slate-100 text-slate-400 font-bold">-</button>
                        <button onclick="modScore('o',1)" class="w-10 h-10 rounded-full bg-orange-500 text-white font-bold shadow-lg">+</button>
                    </div>
                </div>
            </div>
            <p class="viewer-msg text-center text-[9px] font-bold text-slate-300 mt-4 tracking-widest italic uppercase">Vista de Espectador</p>
        </div>

        <!-- Tiempo y Control -->
        <div class="bg-white rounded-3xl p-6 shadow-lg border border-slate-100 flex flex-col items-center">
            <div id="display-time" class="text-7xl font-black text-slate-800 tabular-nums tracking-tighter mb-6">00:00</div>
            
            <div class="admin-controls w-full gap-3">
                <button id="btn-run" onclick="toggleClock()" class="flex-[2] h-16 bg-indigo-600 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl flex items-center justify-center gap-2">
                    <i data-lucide="play" class="w-6 h-6 fill-current"></i> <span>Play</span>
                </button>
                <button onclick="resetMatch()" class="flex-1 h-16 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center">
                    <i data-lucide="refresh-cw" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Slider Local -->
            <div class="w-full mt-2">
                <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase mb-2">
                    <span>Previsión de porteros</span>
                    <span id="label-min" class="text-indigo-600">Minuto 0</span>
                </div>
                <input type="range" id="slider" min="0" max="60" step="5" value="0" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
            </div>
        </div>

        <!-- Listas de Jugadores -->
        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-3">
                <h3 class="text-[10px] font-black uppercase text-yellow-600 pl-2">Equipo Amarillo</h3>
                <div id="list-y" class="space-y-2"></div>
            </div>
            <div class="space-y-3">
                <h3 class="text-[10px] font-black uppercase text-orange-600 pl-2">Equipo Naranja</h3>
                <div id="list-o" class="space-y-2"></div>
            </div>
        </div>

        <!-- Footer Admin Login -->
        <div class="pt-8 pb-4 text-center">
            <button id="login-trigger" onclick="showLogin()" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 mx-auto opacity-50 hover:opacity-100">
                <i data-lucide="lock" class="w-3 h-3"></i> Acceso Organización
            </button>
        </div>
    </main>

    <!-- Modal Login -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 hidden items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-xs text-center">
            <h4 class="font-black uppercase text-sm mb-6">PIN de Control</h4>
            <div class="grid grid-cols-3 gap-3 mb-6">
                {[1,2,3,4,5,6,7,8,9].map(n => `<button onclick="tapPin('${n}')" class="h-14 bg-slate-50 rounded-xl font-bold text-xl">${n}</button>`).join('')}
                <button onclick="hideLogin()" class="bg-red-50 text-red-400 rounded-xl font-bold flex items-center justify-center"><i data-lucide="x" class="w-6 h-6"></i></button>
                <button onclick="tapPin('0')" class="h-14 bg-slate-50 rounded-xl font-bold text-xl">0</button>
                <button onclick="clearPin()" class="bg-slate-100 rounded-xl font-bold flex items-center justify-center"><i data-lucide="delete" class="w-6 h-6"></i></button>
            </div>
            <div id="pin-display" class="flex justify-center gap-4 h-4 mb-4">
                <div class="w-3 h-3 rounded-full bg-slate-200"></div>
                <div class="w-3 h-3 rounded-full bg-slate-200"></div>
                <div class="w-3 h-3 rounded-full bg-slate-200"></div>
                <div class="w-3 h-3 rounded-full bg-slate-200"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIGURACIÓN DATOS
        const playersYellow = ["Víctor", "Guillermo", "Mikel", "Hadi", "Michele", "David"];
        const playersOrange = ["Aureli", "Ayoub II", "Gabriel", "Vila", "Robert", "Mike"];
        const ADMIN_PIN = "1234";

        const appId = "rambleta-final-v5";
        let state = { scoreY: 0, scoreO: 0, secs: 0, running: false, lastUpd: Date.now() };
        let localSecs = 0;
        let clockInterval = null;
        let db;

        // --- RENDERIZADO INICIAL ---
        const render = (s) => {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sc = (s % 60).toString().padStart(2, '0');
            document.getElementById('display-time').innerText = `${m}:${sc}`;
            
            const iter = Math.floor(s / 300);
            drawList('list-y', playersYellow, iter, 'yellow');
            drawList('list-o', playersOrange, iter, 'orange');
            lucide.createIcons();
        };

        const drawList = (id, list, iter, color) => {
            const el = document.getElementById(id);
            let ord = [...list];
            for(let i=0; i<iter; i++) ord.unshift(ord.pop());
            
            el.innerHTML = ord.map((name, i) => {
                let role = i===2 ? '🧤' : (i===5 ? '💤' : '🏃');
                let bg = i===5 ? 'bg-slate-50 opacity-40' : 'bg-white shadow-sm';
                if(i===2) bg = color === 'yellow' ? 'bg-yellow-50 border border-yellow-200 ring-2 ring-yellow-400/20' : 'bg-orange-50 border border-orange-200 ring-2 ring-orange-500/20';
                
                return `
                    <div class="p-3 rounded-2xl border ${bg} flex items-center justify-between">
                        <span class="font-bold text-xs truncate mr-1">${name}</span>
                        <span class="text-xs">${role}</span>
                    </div>
                `;
            }).join('');
        };

        // --- FIREBASE SYNC ---
        try {
            const config = JSON.parse(__firebase_config);
            const app = initializeApp(config);
            db = getFirestore(app);
            const auth = getAuth(app);

            signInAnonymously(auth).then(() => {
                const status = document.getElementById('status-dot');
                status.children[0].classList.replace('bg-red-500', 'bg-green-500');
                status.children[1].innerText = "En Vivo";

                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'match'), (snap) => {
                    if (snap.exists()) {
                        state = snap.data();
                        document.getElementById('score-y').innerText = state.scoreY;
                        document.getElementById('score-o').innerText = state.scoreO;
                        
                        if (state.running) {
                            localSecs = state.secs + Math.floor((Date.now() - state.lastUpd) / 1000);
                            if (!clockInterval) startClock();
                        } else {
                            localSecs = state.secs;
                            stopClock();
                            render(localSecs);
                        }
                    } else {
                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'match'), state);
                    }
                });
            });
        } catch (e) { console.warn("Modo offline"); }

        // --- ACCIONES ---
        window.modScore = async (team, v) => {
            const key = team === 'y' ? 'scoreY' : 'scoreO';
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'match'), { [key]: Math.max(0, state[key] + v) });
        };

        window.toggleClock = async () => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'match'), {
                running: !state.running,
                secs: localSecs,
                lastUpd: Date.now()
            });
        };

        window.resetMatch = async () => {
            if(!confirm("¿Resetear todo?")) return;
            await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'match'), { scoreY: 0, scoreO: 0, secs: 0, running: false, lastUpd: Date.now() });
        };

        function startClock() {
            const btn = document.getElementById('btn-run');
            btn.classList.replace('bg-indigo-600', 'bg-red-500');
            btn.innerHTML = '<i data-lucide="pause" class="w-6 h-6 fill-current"></i> <span>Pausa</span>';
            if(clockInterval) clearInterval(clockInterval);
            clockInterval = setInterval(() => { localSecs++; render(localSecs); }, 1000);
            lucide.createIcons();
        }

        function stopClock() {
            const btn = document.getElementById('btn-run');
            btn.classList.replace('bg-red-500', 'bg-indigo-600');
            btn.innerHTML = '<i data-lucide="play" class="w-6 h-6 fill-current"></i> <span>Play</span>';
            if(clockInterval) clearInterval(clockInterval);
            clockInterval = null;
            lucide.createIcons();
        }

        // --- LOGIN LOGIC ---
        let currentPin = "";
        window.showLogin = () => document.getElementById('login-modal').classList.replace('hidden', 'flex');
        window.hideLogin = () => { document.getElementById('login-modal').classList.replace('flex', 'hidden'); clearPin(); };
        window.clearPin = () => { currentPin = ""; updatePinDots(); };
        window.tapPin = (n) => {
            currentPin += n;
            updatePinDots();
            if(currentPin === ADMIN_PIN) {
                document.body.classList.add('is-admin');
                hideLogin();
                document.getElementById('login-trigger').innerHTML = '<i data-lucide="unlock" class="w-3 h-3 text-green-500"></i> Modo Admin Activo';
                lucide.createIcons();
            } else if(currentPin.length >= 4) {
                setTimeout(clearPin, 200);
            }
        };
        const updatePinDots = () => {
            const dots = document.getElementById('pin-display').children;
            for(let i=0; i<4; i++) dots[i].className = `w-3 h-3 rounded-full ${currentPin.length > i ? 'bg-indigo-600' : 'bg-slate-200'}`;
        };

        // Slider
        document.getElementById('slider').oninput = (e) => {
            const min = parseInt(e.target.value);
            document.getElementById('label-min').innerText = `Minuto ${min}`;
            render(min * 60);
        };

        // INIT
        render(0);
        lucide.createIcons();
    </script>
</body>
</html>
