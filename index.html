<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rambleta LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .admin-controls { display: none; }
        body.is-admin .admin-controls { display: flex; }
        body.is-admin .viewer-only { display: none; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <!-- Navbar -->
    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-40 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black italic text-yellow-400">RAMBLETA LIVE</h1>
                <div id="status" class="flex items-center gap-1.5 opacity-80">
                    <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-yellow-500"></div>
                    <span id="status-text" class="text-[8px] font-bold uppercase tracking-widest text-slate-300">Modo Local</span>
                </div>
            </div>
            <div id="admin-badge" class="hidden bg-green-500 text-white text-[8px] font-black px-2 py-1 rounded uppercase">Admin</div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- Marcador -->
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-200">
            <div class="flex justify-between items-center text-center">
                <div class="flex-1">
                    <p class="text-[9px] font-black text-yellow-600 uppercase tracking-widest mb-1">Amarillo</p>
                    <div class="text-6xl font-black tabular-nums" id="score-y">0</div>
                    <div class="admin-controls justify-center gap-2 mt-2">
                        <button onclick="changeScore('y', -1)" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 font-bold">-</button>
                        <button onclick="changeScore('y', 1)" class="w-10 h-10 rounded-full bg-yellow-400 flex items-center justify-center text-yellow-900 font-bold shadow-sm">+</button>
                    </div>
                </div>
                <div class="font-black text-slate-200 italic mx-4 text-xl">VS</div>
                <div class="flex-1">
                    <p class="text-[9px] font-black text-orange-600 uppercase tracking-widest mb-1">Naranja</p>
                    <div class="text-6xl font-black tabular-nums" id="score-o">0</div>
                    <div class="admin-controls justify-center gap-2 mt-2">
                        <button onclick="changeScore('o', -1)" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 font-bold">-</button>
                        <button onclick="changeScore('o', 1)" class="w-10 h-10 rounded-full bg-orange-500 flex items-center justify-center text-white font-bold shadow-sm">+</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Cronómetro -->
        <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-200 flex flex-col items-center">
            <div id="timer" class="text-7xl font-black text-slate-800 tabular-nums tracking-tighter mb-4">00:00</div>
            
            <div class="admin-controls w-full gap-2">
                <button id="btn-play" onclick="toggleTimer()" class="flex-1 h-14 bg-indigo-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="play" class="w-4 h-4 fill-current"></i> Iniciar
                </button>
                <button onclick="resetAll()" class="w-14 h-14 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center border border-slate-200">
                    <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                </button>
            </div>
            
            <div class="viewer-only py-2 px-6 bg-slate-50 rounded-full border border-slate-100 text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] italic">
                Sincronizado en tiempo real
            </div>
        </div>

        <!-- Simulador (Siempre funciona) -->
        <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">Simulador de Rotación</span>
                <span id="label-min" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded border border-indigo-100">0 min</span>
            </div>
            <input type="range" id="slider" min="0" max="60" step="5" value="0" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
        </div>

        <!-- Jugadores -->
        <div class="grid grid-cols-2 gap-4">
            <div class="space-y-2">
                <h3 class="text-[10px] font-black uppercase text-yellow-600 pl-1">Amarillo 💛</h3>
                <div id="list-y" class="space-y-2"></div>
            </div>
            <div class="space-y-2">
                <h3 class="text-[10px] font-black uppercase text-orange-600 pl-1">Naranja 🧡</h3>
                <div id="list-o" class="space-y-2"></div>
            </div>
        </div>
    </main>

    <!-- Admin Login Bar -->
    <div class="fixed bottom-0 inset-x-0 p-4 bg-white/90 backdrop-blur-md border-t border-slate-200 z-50 shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex gap-2 items-center" id="admin-panel">
            <input type="password" id="pin-input" placeholder="PIN Administrador" class="flex-1 h-12 bg-slate-100 border-none rounded-xl px-4 text-center font-bold tracking-widest focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            <button onclick="checkAdmin()" class="h-12 px-6 bg-slate-900 text-white rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-transform">Entrar</button>
        </div>
        <p id="admin-info" class="text-[8px] text-center text-slate-400 mt-2 font-bold uppercase tracking-widest">Panel de Control Exclusivo Organización</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const playersY = ["Víctor", "Guillermo", "Mikel", "Hadi", "Michele", "David"];
        const playersO = ["Aureli", "Ayoub II", "Gabriel", "Vila", "Robert", "Mike"];
        const PIN = "1234";
        const appId = "rambleta-v7-final";

        let state = { scoreY: 0, scoreO: 0, secs: 0, running: false, lastUpd: Date.now() };
        let localSecs = 0;
        let timerInt = null;
        let db = null;

        // --- UI DRAW ---
        const render = (s) => {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sc = (s % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${sc}`;
            
            const iter = Math.floor(s / 300);
            drawTeam('list-y', playersY, iter, 'yellow');
            drawTeam('list-o', playersO, iter, 'orange');
            lucide.createIcons();
        };

        const drawTeam = (id, list, iter, color) => {
            const el = document.getElementById(id);
            let ord = [...list];
            for(let i=0; i<iter; i++) ord.unshift(ord.pop());
            
            el.innerHTML = ord.map((name, i) => {
                let role = i===2 ? '🧤' : (i===5 ? '💤' : '🏃');
                let bg = i===5 ? 'bg-slate-50 opacity-40 grayscale' : 'bg-white shadow-sm';
                if(i===2) bg = color === 'yellow' ? 'bg-yellow-50 border border-yellow-200' : 'bg-orange-50 border border-orange-200';
                
                return `
                    <div class="p-3 rounded-xl border border-slate-100 ${bg} flex items-center justify-between text-[11px]">
                        <span class="font-bold truncate text-slate-700">${name}</span>
                        <span class="text-lg">${role}</span>
                    </div>
                `;
            }).join('');
        };

        // --- FIREBASE INIT (NON-BLOCKING) ---
        const startSync = async () => {
            try {
                const config = JSON.parse(__firebase_config);
                const app = initializeApp(config);
                db = getFirestore(app);
                const auth = getAuth(app);

                await signInAnonymously(auth);
                
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                dot.className = "w-1.5 h-1.5 rounded-full bg-green-500";
                text.innerText = "Sincronizado";
                text.className = "text-[8px] font-bold uppercase tracking-widest text-green-500";

                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'match'), (snap) => {
                    if (snap.exists()) {
                        state = snap.data();
                        document.getElementById('score-y').innerText = state.scoreY;
                        document.getElementById('score-o').innerText = state.scoreO;
                        
                        if (state.running) {
                            localSecs = state.secs + Math.floor((Date.now() - state.lastUpd) / 1000);
                            if (!timerInt) startLocalTimer();
                        } else {
                            localSecs = state.secs;
                            stopLocalTimer();
                            render(localSecs);
                        }
                    } else {
                        setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'match'), state);
                    }
                });
            } catch(e) {
                console.warn("Offline: Los cambios no se enviarán a otros dispositivos.");
            }
        };

        // --- ADMIN LOGIN ---
        window.checkAdmin = () => {
            const pin = document.getElementById('pin-input').value;
            if (pin === PIN) {
                document.body.classList.add('is-admin');
                document.getElementById('admin-badge').classList.remove('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('admin-info').innerText = "✅ Estás en modo Administrador";
                document.getElementById('admin-info').className = "text-[8px] text-center text-green-600 mt-2 font-black uppercase";
                lucide.createIcons();
            } else {
                const input = document.getElementById('pin-input');
                input.value = "";
                input.placeholder = "PIN INCORRECTO";
                input.classList.add('ring-2', 'ring-red-500');
                setTimeout(() => {
                    input.classList.remove('ring-2', 'ring-red-500');
                    input.placeholder = "PIN Administrador";
                }, 1500);
            }
        };

        // --- CONTROL ACTIONS ---
        window.changeScore = async (t, v) => {
            const key = t === 'y' ? 'scoreY' : 'scoreO';
            state[key] = Math.max(0, state[key] + v);
            document.getElementById(`score-${t}`).innerText = state[key]; // Update UI immediately
            
            if (db) {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'match'), { [key]: state[key] });
                } catch(e) {}
            }
        };

        window.toggleTimer = async () => {
            state.running = !state.running;
            state.secs = localSecs;
            state.lastUpd = Date.now();
            
            if (state.running) startLocalTimer();
            else stopLocalTimer();

            if (db) {
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'match'), {
                        running: state.running,
                        secs: state.secs,
                        lastUpd: state.lastUpd
                    });
                } catch(e) {}
            }
        };

        window.resetAll = async () => {
            if(!confirm("¿Deseas reiniciar el marcador y tiempo para todos?")) return;
            state = { scoreY: 0, scoreO: 0, secs: 0, running: false, lastUpd: Date.now() };
            localSecs = 0;
            stopLocalTimer();
            render(0);
            document.getElementById('score-y').innerText = 0;
            document.getElementById('score-o').innerText = 0;

            if (db) {
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'match'), state);
                } catch(e) {}
            }
        };

        function startLocalTimer() {
            const b = document.getElementById('btn-play');
            if(b) {
                b.innerHTML = '<i data-lucide="pause" class="w-4 h-4 fill-current"></i> Pausar';
                b.classList.replace('bg-indigo-600', 'bg-red-500');
            }
            if(timerInt) clearInterval(timerInt);
            timerInt = setInterval(() => { localSecs++; render(localSecs); }, 1000);
            lucide.createIcons();
        }

        function stopLocalTimer() {
            const b = document.getElementById('btn-play');
            if(b) {
                b.innerHTML = '<i data-lucide="play" class="w-4 h-4 fill-current"></i> Reanudar';
                b.classList.replace('bg-red-500', 'bg-indigo-600');
            }
            if(timerInt) clearInterval(timerInt);
            timerInt = null;
            lucide.createIcons();
        }

        // Slider logic
        document.getElementById('slider').oninput = (e) => {
            const m = parseInt(e.target.value);
            document.getElementById('label-min').innerText = `${m} min`;
            render(m * 60);
        };

        // Initialize UI before sync
        render(0);
        startSync();
        lucide.createIcons();
    </script>
</body>
</html>
